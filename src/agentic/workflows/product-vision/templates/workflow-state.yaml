# Workflow State Template
# Tracks progress through product-vision workflow
# Location: {output_path}/workflow-state.yaml

workflow: product-vision
version: "1.0.0"

# Workflow configuration
input_type: "user" # or "file"
input_source: null # path or null

# Topic identification
topic: "" # kebab-case topic slug
instance_id: "" # YYYYMMDD-HHMMSS-XXXX
output_path: "" # {ide-folder}/{outputFolder}/product/vision/{topic}/{instance_id}

# Timing
started_at: "" # ISO timestamp
updated_at: "" # ISO timestamp
completed_at: null # ISO timestamp when done

# Progress tracking
status: "pending" # pending | in_progress | completed | failed
current_step: 0
steps_completed: []
# Example:
#   - step: 1
#     name: "input-detection"
#     completed_at: "2024-01-15T10:00:00Z"
#     output: null
#   - step: 2
#     name: "context-gathering"
#     completed_at: "2024-01-15T10:05:00Z"
#     output: ".../context-topic.md"
#   - step: 3
#     name: "creative-exploration"
#     completed_at: "2024-01-15T10:45:00Z"
#     output: ".../brainstorming-topic.md"

# Brainstorming session
brainstorming_techniques_used: []
ideas_generated: 0
technique_selection_mode: "" # user-selected | ai-recommended | random | progressive

# Vision discovery confirmation loop
discovery_attempts: 0
discovery_confirmed: false

# Vision deepening
questions_asked: 0
critical_open_questions: 0
decisions_logged: 0

# Artifacts created
artifacts:
  context: null # context-{topic}.md
  brainstorming: null # brainstorming-{topic}.md
  discovery: null # discovery-{topic}.md
  vision_decisions: null # vision-decisions.md
  vision: null # vision-{topic}.md

# Validation flags
validation:
  context_gathering_complete: false
  brainstorming_complete: false
  discovery_complete: false
  required_sections_present: false
  discovery_confirmed: false
  gate_passed: false
