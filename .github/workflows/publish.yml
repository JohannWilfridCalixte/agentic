name: Publish to npm

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Detect dist-tag from git tag
        id: dist-tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if [[ "$TAG" =~ -([a-zA-Z]+) ]]; then
            echo "flag=--tag ${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - run: bun publish ${{ steps.dist-tag.outputs.flag }}
