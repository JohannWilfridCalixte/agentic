name: Publish to npm

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Detect dist-tag from git tag
        id: dist-tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" =~ -([a-zA-Z]+) ]]; then
            echo "flag=--tag ${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - run: npm publish --provenance --access public ${{ steps.dist-tag.outputs.flag }}

      - name: Also tag prerelease as latest
        if: steps.dist-tag.outputs.prerelease == 'true'
        run: npm dist-tag add "$(node -p "require('./package.json').name")@${{ steps.dist-tag.outputs.version }}" latest
